<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片编辑器</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(15, 23, 42, 0.72);
      --line: rgba(255, 255, 255, 0.08);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent1: #60a5fa;
      --accent2: #a78bfa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.18), transparent 30%),
        radial-gradient(circle at right center, rgba(167,139,250,0.15), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .shell {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: stretch;
    }
    .hero, .panel {
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }
    .hero {
      padding: 34px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 520px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: auto -60px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(96,165,250,0.26), transparent 70%);
      pointer-events: none;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      color: #dbeafe;
      font-size: 13px;
      background: rgba(255,255,255,0.04);
    }
    .title {
      margin-top: 18px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }
    .title span {
      display: block;
      background: linear-gradient(90deg, #fff, #c7d2fe 55%, #93c5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .desc {
      margin-top: 18px;
      max-width: 52ch;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }
    .feature-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 28px;
      position: relative;
      z-index: 1;
    }
    .feature {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #d1d5db;
      font-size: 14px;
    }
    .feature b { color: #fff; }
    .panel {
      padding: 26px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      justify-content: center;
      min-height: 520px;
    }
    .panel h2 {
      font-size: 22px;
      margin-bottom: 6px;
    }
    .panel p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }
    .upload-btn {
      margin-top: 8px;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      border: none;
      padding: 16px 22px;
      font-size: 16px;
      border-radius: 16px;
      box-shadow: 0 14px 30px rgba(96,165,250,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-weight: 600;
    }
    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(167,139,250,0.26);
    }
    .upload-btn input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .tip {
      font-size: 13px;
      color: #94a3b8;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 16px;
      line-height: 1.7;
    }
    code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #dbeafe;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    #editor_container {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
    }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .hero, .panel { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <div class="badge"> 在线图片工坊 </div>
        <h1 class="title"><span>上传图片</span>立即开始编辑</h1>
        <p class="desc">
          这是一个轻量、清爽的图片编辑入口。支持裁剪、旋转、滤镜、标注、水印和调整大小，也支持通过 URL 直接打开外链图片。
        </p>
      </div>
      <div class="feature-list">
        <div class="feature"><b>支持</b> 手动上传</div>
        <div class="feature"><b>支持</b> 外链直开</div>
        <div class="feature"><b>支持</b> 自动下载保存</div>
        <div class="feature"><b>支持</b> 中文界面</div>
      </div>
    </section>

    <section class="panel">
      <h2>开始使用</h2>
      <p>点击下面按钮上传图片，或者直接访问带参数链接：</p>
      <div class="tip"><code>?image=...</code> 自动加载图片，<code>&name=...</code> 设置保存文件名。</div>
      <label class="upload-btn">
        选择图片并开始编辑
        <input type="file" accept="image/*" id="file-input" />
      </label>
      <p>外链图片需要目标站点允许浏览器跨域读取；如果不允许，页面会提示加载失败。</p>
    </section>
  </main>

  <div id="editor_container"></div>

  <script src="https://cdn.scaleflex.it/plugins/filerobot-image-editor/4.5.0/filerobot-image-editor.min.js"></script>
  <script>
    const zhCN = {
      name: '名称', save: '保存', saveAs: '另存为', back: '返回', loading: '加载中...',
      resetOperations: '重置/删除所有操作', changesLoseWarningHint: '如果您点击"重置"按钮，您的更改将会丢失。是否继续？',
      discardChangesWarningHint: '如果您关闭此窗口，您最后的更改将不会被保存。', cancel: '取消', apply: '应用', warning: '警告',
      confirm: '确认', discardChanges: '放弃更改', undoTitle: '撤销上一步操作', redoTitle: '重做上一步操作',
      showImageTitle: '显示原始图像', zoomInTitle: '放大', zoomOutTitle: '缩小', toggleZoomMenuTitle: '切换缩放菜单',
      adjustTab: '调整', finetuneTab: '微调', filtersTab: '滤镜', watermarkTab: '水印', annotateTabLabel: '标注',
      resize: '调整大小', resizeTab: '调整大小', imageName: '图像名称', invalidImageError: '提供的图像无效。',
      uploadImageError: '上传图像时出错。', areNotImages: '不是图像文件', isNotImage: '不是图像文件',
      toBeUploaded: '待上传', cropTool: '裁剪', original: '原始', custom: '自定义', square: '正方形', landscape: '横向',
      portrait: '竖向', ellipse: '椭圆', classicTv: '经典电视', cinemascope: '宽银幕', arrowTool: '箭头', blurTool: '模糊',
      brightnessTool: '亮度', contrastTool: '对比度', ellipseTool: '椭圆', unFlipX: '取消水平翻转', flipX: '水平翻转',
      unFlipY: '取消垂直翻转', flipY: '垂直翻转', hsvTool: 'HSV', hue: '色相', brightness: '亮度', saturation: '饱和度',
      value: '明度', imageTool: '图片', importing: '导入中...', addImage: '+ 添加图片', uploadImage: '上传图片', fromGallery: '从图库选取',
      lineTool: '直线', penTool: '画笔', polygonTool: '多边形', sides: '边数', rectangleTool: '矩形', cornerRadius: '圆角半径',
      resizeWidthTitle: '宽度（像素）', resizeHeightTitle: '高度（像素）', toggleRatioLockTitle: '切换比例锁定', resetSize: '重置为原始图像大小',
      rotateTool: '旋转', textTool: '文字', textSpacings: '文字间距', textAlignment: '文字对齐', fontFamily: '字体', size: '大小',
      letterSpacing: '字母间距', lineHeight: '行高', warmthTool: '色温', addWatermark: '+ 添加水印', addTextWatermark: '+ 添加文字水印',
      addWatermarkTitle: '选择水印类型', uploadWatermark: '上传水印', addWatermarkAsText: '以文字形式添加', padding: '内边距', paddings: '内边距',
      shadow: '阴影', horizontal: '水平', vertical: '垂直', blur: '模糊', opacity: '不透明度', transparency: '透明度', position: '位置',
      stroke: '描边', saveAsModalTitle: '另存为', extension: '扩展名', format: '格式', nameIsRequired: '名称不能为空。', quality: '质量',
      imageDimensionsHoverTitle: '保存图片尺寸（宽 x 高）', cropSizeLowerThanResizedWarning: '注意：裁剪区域小于调整大小，可能导致质量下降。',
      actualSize: '实际大小（100%）', fitSize: '适应大小', addImageTitle: '选择要添加的图片...', mutualizedFailedToLoadImg: '图片加载失败。',
      tabsMenu: '菜单', download: '下载', width: '宽度', height: '高度', plus: '+', cropItemNoEffect: '此裁剪项无可用预览'
    };

    let editorInstance = null;
    function launchEditor(src, filename) {
      document.querySelector('.shell').style.display = 'none';
      const container = document.getElementById('editor_container');
      container.style.display = 'block';
      if (editorInstance) editorInstance.terminate();
      const { TABS, TOOLS } = window.FilerobotImageEditor;
      editorInstance = new window.FilerobotImageEditor(container, {
        source: src,
        translations: zhCN,
        tabsIds: [TABS.ADJUST, TABS.FINETUNE, TABS.FILTERS, TABS.ANNOTATE, TABS.WATERMARK, TABS.RESIZE],
        defaultTabId: TABS.ADJUST,
        defaultToolId: TOOLS.CROP,
        onSave: function(editedImageObject) {
          const link = document.createElement('a');
          link.href = editedImageObject.imageBase64;
          link.download = editedImageObject.fullName || filename || 'edited-image.png';
          link.click();
        },
        onClose: function() {
          editorInstance.terminate();
          editorInstance = null;
          container.style.display = 'none';
          document.querySelector('.shell').style.display = 'grid';
          document.getElementById('file-input').value = '';
        }
      });
      editorInstance.render();
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      launchEditor(URL.createObjectURL(file), file.name);
    });

    (function() {
      const params = new URLSearchParams(window.location.search);
      const rawImage = params.get('image');
      const rawName = params.get('name');
      const imageUrl = rawImage ? decodeURIComponent(rawImage) : null;
      const downloadName = rawName ? decodeURIComponent(rawName) : 'image.png';
      if (!imageUrl) return;
      document.querySelector('.shell').style.display = 'none';
      document.getElementById('editor_container').style.display = 'block';
      fetch(imageUrl)
        .then(res => {
          if (!res.ok) throw new Error('图片下载失败');
          return res.blob();
        })
        .then(blob => launchEditor(URL.createObjectURL(blob), downloadName))
        .catch(err => {
          console.error(err);
          alert('外部图片加载失败，请检查链接是否允许跨域访问。');
          document.querySelector('.shell').style.display = 'grid';
          document.getElementById('editor_container').style.display = 'none';
        });
    })();
  </script>
</body>
</html>
